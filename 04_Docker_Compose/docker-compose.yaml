name: retail-sample
networks:
  default:
    name: retail-sample_default
services:
  cart:
  
    cap_add:
      - NET_BIND_SERVICE # Allow the service to bind to privileged ports (if needed)
    cap_drop:
      - all # Drop all other capabilities to minimize attack surface
    depends_on:
      carts-db: # Ensure the cart service starts after the carts-db service is healthy
        condition: service_healthy # Wait for the carts-db service to pass its health check before starting the cart service
        required: true # Mark the dependency as required, so if carts-db fails to start, the cart service will not start
    environment: # Set environment variables for the cart service configuration
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_CART_PERSISTENCE_PROVIDER=dynamodb
      - RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT=http://carts-db:8000
      - RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE=true
      - AWS_ACCESS_KEY_ID=key
      - AWS_SECRET_ACCESS_KEY=dummy
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: carts
    networks:
      default: null # Connect to the default network without creating an alias
    ports: [] # Do not publish any ports for the cart service, as it is only accessed internally by other services
    read_only: true # Set the container's filesystem to read-only to prevent unauthorized modifications
    restart: always # Always restart the container if it stops, to ensure high availability
    security_opt:
      - no-new-privileges:true # Prevent the container from gaining new privileges, even if it is compromised
    tmpfs:
      - /tmp:rw,noexec,nosuid # Mount a tmpfs volume at /tmp with read-write permissions, but noexec and nosuid options for security hardening
    image: public.ecr.aws/aws-containers/retail-store-sample-cart:1.3.0 # Use a specific version of the cart service image from Amazon ECR Public Gallery
  carts-db:
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    cap_drop:
      - all
    healthcheck:
      interval: 5s
      retries: 3
      test:
        - CMD-SHELL
        - exit 0
      timeout: 15s
    hostname: carts-db
    image: amazon/dynamodb-local:1.20.0
    networks:
      default: null
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid
  catalog:
    cap_drop:
      - all
    depends_on:
      catalog-db:
  
        # Wait for the catalog-db service to pass its health check before starting the catalog service
        condition: service_healthy 
        
        # Mark the dependency as required, so if catalog-db fails to start, the catalog service will not start
        required: true
        
        # If the catalog-db service fails to start, the catalog service will not start, 
        # and if catalog-db restarts, the catalog service will also restart to maintain the dependency relationship
        restart: true 
    
    environment:
      - GIN_MODE=release
      - reschedule=on-node-failure
      - RETAIL_CATALOG_PERSISTENCE_PROVIDER=mysql
      - RETAIL_CATALOG_PERSISTENCE_PASSWORD=${DB_PASSWORD}
      - RETAIL_CATALOG_PERSISTENCE_ENDPOINT=catalog-db:3306
    healthcheck:
      interval: 10s
      retries: 3
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/health || exit 1
      timeout: 10s
    hostname: catalog # Set the hostname to "catalog" for easier service discovery by other services, instead of using the default container ID or network alias
    networks:
      default: null
    ports: [] # Do not publish any ports for the catalog service, as it is only accessed internally by other services
    restart: always # Always restart the container if it stops, to ensure high availability of the catalog service
    security_opt:
      - no-new-privileges:true
    image: public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0
  catalog-db:
    environment:
      - reschedule=on-node-failure
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_ALLOW_EMPTY_PASSWORD=true
      - MYSQL_DATABASE=catalogdb
      - MYSQL_USER=catalog_user
      
      # Set the MySQL root password and create a database and user for the
      # catalog service, using the DB_PASSWORD variable for security.
      # This environmaent variable is taken from the host environment when running docker-compose:
      - MYSQL_PASSWORD=${DB_PASSWORD}

    healthcheck:
      interval: 10s
      retries: 3
      start_period: 30s

      # Use mysqladmin ping to check if the MySQL server is responsive,
      # with the appropriate credentials and host 
      # CLI style: mysqladmin ping -h localhost -u catalog_user -p"${DB_PASSWORD}"
      test: 
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - catalog_user
        - -p${DB_PASSWORD}
      timeout: 5s
    hostname: catalog-db
    image: mariadb:10.9
    networks:
      default: null
    restart: always
    security_opt:
      - no-new-privileges:true # Prevent the container from gaining new privileges, even if it is compromised
  checkout:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - all
    depends_on:
      checkout-redis:
        condition: service_healthy
        required: true
    environment:
      - RETAIL_CHECKOUT_PERSISTENCE_PROVIDER=redis
      - RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL=redis://checkout-redis:6379
      # The checkout service needs to communicate with the orders service to create orders.
      # It uses the orders hostnme defined in the orders service configuration for service discovery,
      # and the standard port 8080 used by the orders service.
      - RETAIL_CHECKOUT_ENDPOINTS_ORDERS=http://orders:8080
    healthcheck:
      interval: 10s
      retries: 3
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/health || exit 1
      timeout: 10s
    hostname: checkout
    networks:
      default: null
    ports: []
    read_only: true
    restart: always
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-checkout:1.3.0
  checkout-redis:
    healthcheck:
      interval: 1s
      retries: 30
      test:
        - CMD
        - redis-cli
        - ping
      timeout: 3s
    hostname: checkout-redis
    image: redis:6.0-alpine
    networks:
      default: null
    ports: []
    restart: always
  orders:
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - all
    depends_on:
      orders-db:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - reschedule=on-node-failure
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_ORDERS_PERSISTENCE_PROVIDER=postgres
      - RETAIL_ORDERS_PERSISTENCE_ENDPOINT=orders-db:5432
      - RETAIL_ORDERS_PERSISTENCE_NAME=orders
      - RETAIL_ORDERS_PERSISTENCE_USERNAME=orders_user
      - RETAIL_ORDERS_PERSISTENCE_PASSWORD=${DB_PASSWORD}
      - RETAIL_ORDERS_MESSAGING_PROVIDER=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_ADDRESSES=rabbitmq:5672
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_USERNAME=rabbitmq
      - RETAIL_ORDERS_MESSAGING_RABBITMQ_PASSWORD=${DB_PASSWORD}
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: orders
    networks:
      default: null
    ports: []
    read_only: true
    restart: always
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    image: public.ecr.aws/aws-containers/retail-store-sample-orders:1.3.0
  orders-db:
    environment:
      - reschedule=on-node-failure
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=orders
      - POSTGRES_USER=orders_user
    healthcheck:
      interval: 10s
      retries: 30
      test:
        - CMD-SHELL
        - pg_isready -d orders -U orders_user
      timeout: 5s
    hostname: orders-db
    image: postgres:16.1
    networks:
      default: null
    ports: []
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    restart: always
    security_opt:
      - no-new-privileges:true
  rabbitmq:
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=${DB_PASSWORD}
    hostname: rabbitmq
    image: rabbitmq:3-management
    networks:
      default: null
    ports: []
    restart: always
    security_opt:
      - no-new-privileges:true
  ui:
    cap_drop:
      - ALL
    depends_on:
      # Ensure the UI service starts after the cart, catalog, checkout, and orders services are healthy,
      # as it depends on them for its functionality and will not work properly if they are not available.
      # If any of these services fail to start or become unhealthy, the UI service will also fail
      # to start or become unhealthy, to maintain the integrity of the application and prevent
      # errors or inconsistent behavior:
      cart:
        condition: service_healthy
        required: true
        restart: true
      catalog:
        condition: service_healthy
        required: true
        restart: true
      checkout:
        condition: service_healthy
        required: true
        restart: true
      orders:
        condition: service_healthy
        required: true
        restart: true
    environment:
      - JAVA_OPTS=-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom
      - SERVER_TOMCAT_ACCESSLOG_ENABLED=true
      - RETAIL_UI_ENDPOINTS_CATALOG=http://catalog:8080
      - RETAIL_UI_ENDPOINTS_CARTS=http://carts:8080
      - RETAIL_UI_ENDPOINTS_ORDERS=http://orders:8080
      - RETAIL_UI_ENDPOINTS_CHECKOUT=http://checkout:8080
    healthcheck:
      interval: 10s
      retries: 3
      start_period: 15s
      test:
        - CMD-SHELL
        - curl -s -f http://localhost:8080/actuator/health || exit 1
      timeout: 10s
    hostname: ui
    mem_limit: 512m # Limit the maximum memory usage of the UI service to 512MB to prevent it from consuming excessive resources and affecting other services
    networks:
      default: null
    ports: # The UI service is accessible from outside the Docker network, so we need to publish its port to the host machine !
      # Publish the UI service on port 8888 of the host machine, using TCP protocol,
      # and forward it to port 8080 of the container where the UI application is running.
      # This allows users to access the UI through http://localhost:8888 while keeping the
      # internal communication between services on port 8080.
      - mode: ingress 
        protocol: tcp
        published: "8888"
        target: 8080
    restart: always
    image: public.ecr.aws/aws-containers/retail-store-sample-ui:1.3.0

volumes:
  orders-db-data:
